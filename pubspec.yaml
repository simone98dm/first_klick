name: first_klick
description: "A GPS running tracker with BLE heart rate and Strava integration."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Database (Drift / SQLite)
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24

  # Background service
  flutter_background_service: ^5.0.9

  # Local notifications (iOS activity notification updates)
  flutter_local_notifications: ^18.0.1

  # GPS
  geolocator: ^13.0.2

  # BLE
  flutter_blue_plus: ^1.35.3

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # HTTP
  dio: ^5.7.0

  # Strava OAuth
  flutter_web_auth_2: ^4.0.1

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Env variables
  flutter_dotenv: ^5.2.1

  # Navigation
  go_router: ^14.6.2

  # Permissions
  permission_handler: ^11.4.0

  # Share
  share_plus: ^10.0.0

  # Utilities
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

  # Logging
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

  # Riverpod code generation
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.3.13

  # App icon generation
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - .env
